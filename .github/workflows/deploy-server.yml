name: Deploy Server to Azure

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/deploy-server.yml'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: realtynest-api
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./server
        run: npm install --no-audit

      - name: Generate Prisma Client
        working-directory: ./server
        run: npx prisma generate

      - name: Bundle with esbuild
        working-directory: ./server
        run: npm run build:bundle

      - name: Prepare deployment package
        working-directory: ./server
        run: |
          mkdir -p deploy

          # Copy the single bundled server file
          cp bundle/server.js deploy/

          # Copy prisma schema
          cp -r prisma deploy/

          # Create package.json with prisma runtime dep
          cat > deploy/package.json << 'PKGJSON'
          {
            "name": "realtynest-api",
            "type": "module",
            "scripts": { "start": "node server.js" },
            "dependencies": {
              "@prisma/client": "^7.0.0"
            }
          }
          PKGJSON

          # Install prisma runtime + all transitive deps (clean node_modules)
          cd deploy
          npm install --omit=dev --no-audit --ignore-scripts
          cd ..

          # Copy generated prisma client (from prisma generate) — uses non-dot name
          # to avoid Kudu's tar excluding dot-prefixed directories
          PRISMA_ROOT="../node_modules"
          if [ -d "node_modules/generated-prisma-client" ]; then
            PRISMA_ROOT="node_modules"
          fi
          cp -r "$PRISMA_ROOT/generated-prisma-client" deploy/node_modules/

          # Show deploy size
          echo "=== Deploy package ==="
          du -sh deploy/
          du -sh deploy/node_modules/
          ls -la deploy/

      - name: Create deployment zip
        working-directory: ./server/deploy
        run: zip -qr ../../server-deploy.zip .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        run: |
          az webapp deploy \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group realtynest-rg \
            --src-path server-deploy.zip \
            --type zip \
            --async true \
            --timeout 300 || echo "⚠️ Deploy poll timed out — checking health instead"

      - name: Verify deployment
        run: |
          echo "Waiting 90s for container to start..."
          sleep 90
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/health || echo "000")
          echo "Health check status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Server is healthy!"
          else
            echo "⚠️ Health check returned $STATUS — container may still be starting"
          fi
          echo "App URL: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
