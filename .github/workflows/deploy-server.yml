name: Deploy Server to Azure

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/deploy-server.yml'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: realtynest-api
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./server
        run: npm install

      - name: Generate Prisma Client
        working-directory: ./server
        run: npx prisma generate

      - name: Build TypeScript
        working-directory: ./server
        run: npm run build

      - name: Prepare deployment package
        working-directory: ./server
        run: |
          mkdir -p deploy
          cp -r dist/* deploy/
          cp -r prisma deploy/
          # Create a deploy-specific package.json with correct start script
          node -e "
            const pkg = require('./package.json');
            const deployPkg = {
              name: pkg.name,
              version: pkg.version,
              type: 'module',
              scripts: { start: 'node index.js' },
              dependencies: { ...pkg.dependencies }
            };
            require('fs').writeFileSync('deploy/package.json', JSON.stringify(deployPkg, null, 2));
          "
          cat deploy/package.json

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        run: |
          cd server/deploy
          zip -qr ../../server-deploy.zip .
          ls -lh ../../server-deploy.zip
          az webapp deploy --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group realtynest-rg --src-path ../../server-deploy.zip --type zip --async true


