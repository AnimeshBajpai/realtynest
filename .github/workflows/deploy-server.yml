name: Deploy Server to Azure

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/deploy-server.yml'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: realtynest-api
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./server
        run: npm install --no-audit

      - name: Generate Prisma Client
        working-directory: ./server
        run: npx prisma generate

      - name: Build TypeScript
        working-directory: ./server
        run: npm run build

      - name: Prepare deployment package
        working-directory: ./server
        run: |
          mkdir -p deploy
          cp -r dist/* deploy/
          cp -r prisma deploy/
          cp package.json deploy/
          cd deploy
          # Override start script for Azure
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json','utf8'));
            pkg.scripts = { start: 'node index.js' };
            pkg.main = 'index.js';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          npm install --omit=dev --ignore-scripts --no-audit
          npx prisma generate
          # Cleanup caches
          rm -rf node_modules/.cache

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_SERVER }}
          package: ./server/deploy

      - name: Deployment Status
        run: |
          echo "✅ Server deployment completed!"


