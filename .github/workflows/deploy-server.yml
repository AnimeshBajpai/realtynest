name: Deploy Server to Azure

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/deploy-server.yml'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: realtynest-api
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./server
        run: npm install --no-audit

      - name: Generate Prisma Client
        working-directory: ./server
        run: npx prisma generate

      - name: Bundle with esbuild
        working-directory: ./server
        run: npm run build:bundle

      - name: Prepare deployment package
        working-directory: ./server
        run: |
          mkdir -p deploy
          # Copy the single bundled server file
          cp bundle/server.js deploy/
          # Copy Prisma runtime (the only external dependency)
          mkdir -p deploy/node_modules/@prisma
          cp -r node_modules/@prisma/client deploy/node_modules/@prisma/
          cp -r node_modules/.prisma deploy/node_modules/
          # Copy prisma schema (needed for prisma client)
          cp -r prisma deploy/
          # Create minimal package.json
          echo '{"name":"realtynest-api","type":"module","scripts":{"start":"node server.js"}}' > deploy/package.json
          # Show deploy size
          echo "=== Deploy package ==="
          du -sh deploy/
          ls -la deploy/

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ./server/deploy

      - name: Deployment Status
        run: echo "✅ Server deployment completed!"


