name: Deploy Server to Azure

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/deploy-server.yml'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: realtynest-api
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./server
        run: npm install --no-audit

      - name: Generate Prisma Client
        working-directory: ./server
        run: npx prisma generate

      - name: Bundle with esbuild
        working-directory: ./server
        run: npm run build:bundle

      - name: Prepare deployment package
        working-directory: ./server
        run: |
          mkdir -p deploy
          # Copy the single bundled server file
          cp bundle/server.js deploy/

          # Copy prisma schema (needed for prisma client)
          cp -r prisma deploy/

          # Create package.json with only prisma runtime deps
          # npm install in deploy/ will pull @prisma/client + ALL transitive deps
          cat > deploy/package.json << 'EOF'
          {
            "name": "realtynest-api",
            "type": "module",
            "scripts": { "start": "node server.js" },
            "dependencies": {
              "@prisma/client": "^7.0.0"
            }
          }
          EOF

          # Install only prisma runtime deps (clean, complete node_modules)
          cd deploy
          npm install --production --no-audit --ignore-scripts
          cd ..

          # Copy generated prisma client (from prisma generate)
          PRISMA_ROOT="../node_modules"
          if [ -d "node_modules/.prisma" ]; then
            PRISMA_ROOT="node_modules"
          fi
          cp -r "$PRISMA_ROOT/.prisma" deploy/node_modules/

          # Show deploy size
          echo "=== Deploy package ==="
          du -sh deploy/
          du -sh deploy/node_modules/
          ls -la deploy/

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ./server/deploy

      - name: Deployment Status
        run: echo "✅ Server deployment completed!"


