name: Deploy Client to Azure

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/deploy-client.yml'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: realtynest-client
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./client
        run: npm install

      - name: Build
        working-directory: ./client
        run: npm run build
        env:
          VITE_API_URL: https://realtynest-api.azurewebsites.net/api

      - name: Create web.config for SPA routing
        working-directory: ./client/dist
        run: |
          cat > staticwebapp.config.json << 'EOF'
          {
            "navigationFallback": {
              "rewrite": "/index.html"
            }
          }
          EOF

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        run: |
          cd client/dist
          zip -qr ../../client-deploy.zip .
          az webapp deploy --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group realtynest-rg --src-path ../../client-deploy.zip --type zip
